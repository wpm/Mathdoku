name: Linux Smoke Test

# Verifies that the Linux Designer bundles (.deb, .rpm, .AppImage) install and
# launch on a *clean* OS, so a missing runtime dependency is caught in CI
# instead of on a user's machine. The Designer is a Tauri app; on Linux it
# renders through WebKitGTK, which needs a display and the right runtime
# libraries — none of which a stock distro image carries.
#
# Two distinct things are checked (see .github/workflows/linux-smoke/run-smoke.sh):
#   1. Install mechanics — does the package install and resolve its declared
#      dependencies on a stock distro.
#   2. Launch            — does the app actually start without crashing on a
#      missing library (a liveness proxy: alive after ~15s under Xvfb).
#
# Runs in three contexts:
#   • push to main touching apps/designer/** — continuous, post-merge.
#   • workflow_dispatch — on demand.
#   • workflow_call from release-designer.yml — gates a `designer-v*` release
#     against the real release bundles (skip-build: true; see below).

on:
  push:
    branches: [main]
    paths:
      - "apps/designer/**"
      - ".github/workflows/linux-smoke.yml"
      - ".github/workflows/linux-smoke/**"
  workflow_dispatch:
  workflow_call:
    inputs:
      skip-build:
        description: >-
          Skip the build job and smoke-test a pre-existing
          `linux-designer-bundles` artifact uploaded earlier in the same run.
          release-designer.yml sets this true to test the real release bundles
          instead of rebuilding them.
        type: boolean
        default: false

permissions: {}

# One smoke run per ref is enough; newer pushes supersede older in-flight ones.
concurrency:
  group: linux-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build the Linux bundles unsigned (skipped when a caller supplies them) ──
  # Mirrors the GTK/WebKitGTK apt deps and trunk + tauri-cli setup of
  # release-designer.yml, but produces no release and does no signing.
  build:
    name: Build Linux bundles
    if: ${{ !inputs.skip-build }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # The frontend is a wasm app; the desktop shell builds for the host.
          targets: wasm32-unknown-unknown, x86_64-unknown-linux-gnu

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      # Linux desktop builds need GTK/WebKitGTK and friends (same set as
      # release-designer.yml).
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # trunk builds the wasm frontend (invoked by tauri via beforeBuildCommand);
      # tauri-cli drives the unsigned bundle build.
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      # createUpdaterArtifacts is committed `true` in tauri.conf.json so the
      # real release (release-designer.yml) emits signed updater artifacts.
      # That flag also forces *this* unsigned smoke build to demand
      # TAURI_SIGNING_PRIVATE_KEY, which it intentionally doesn't set. The
      # smoke test only installs and launches the .deb/.rpm/.AppImage and has
      # no use for updater artifacts, so override the flag off here.
      - name: Build unsigned Linux bundles
        working-directory: apps/designer/src-tauri
        run: |
          cargo tauri build --target x86_64-unknown-linux-gnu \
            --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-designer-bundles
          # Workspace target dir lives at the repo root. Globbing the three
          # user-facing bundles excludes the .AppImage.tar.gz updater archive.
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7

  # ── Smoke-test each format on a clean image, in parallel ────────────────────
  # .deb on ubuntu:22.04 and .rpm on fedora:latest run inside fresh containers
  # (no inherited libraries); .AppImage runs on the bare runner. The screenshot
  # is uploaded so a blank/non-interactive window can be spotted by eye.
  smoke:
    name: Smoke (${{ matrix.format }})
    needs: build
    # Run whether build ran (push/dispatch) or was skipped (a caller supplied
    # the bundles via skip-build).
    if: ${{ always() && (needs.build.result == 'success' || inputs.skip-build) }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read # actions/download-artifact reads the run's artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: deb
            image: ubuntu:22.04
          - format: rpm
            image: fedora:latest
          # Empty image → the AppImage runs directly on the runner, not in a
          # container.
          - format: AppImage
            image: ""
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          name: linux-designer-bundles
          path: bundles

      - name: Locate the ${{ matrix.format }} bundle
        id: find
        run: |
          file="$(find bundles -type f -name "*.${{ matrix.format }}" | head -n1)"
          if [ -z "$file" ]; then
            echo "::error::no *.${{ matrix.format }} bundle found in the artifact"
            exit 1
          fi
          echo "Found $file"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      # Containers exercise dependency resolution on a stock distro; the runner
      # cannot run two container images per job, so each format is its own
      # matrix leg.
      - name: Smoke test in ${{ matrix.image }}
        if: matrix.image != ''
        run: |
          docker run --rm -v "$PWD:/work" -w /work "${{ matrix.image }}" \
            bash .github/workflows/linux-smoke/run-smoke.sh \
              "${{ matrix.format }}" "${{ steps.find.outputs.file }}" \
              "screenshot-${{ matrix.format }}.png"

      - name: Smoke test on the runner
        if: matrix.image == ''
        run: |
          bash .github/workflows/linux-smoke/run-smoke.sh \
            "${{ matrix.format }}" "${{ steps.find.outputs.file }}" \
            "screenshot-${{ matrix.format }}.png"

      - name: Upload launch screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshot-${{ matrix.format }}
          path: screenshot-${{ matrix.format }}.png
          if-no-files-found: warn
          retention-days: 7
