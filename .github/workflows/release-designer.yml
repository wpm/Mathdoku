name: Release Designer

# Builds, signs, and publishes the desktop Mathdoku Designer app, producing the
# auto-updater manifest (`latest.json`) that installed copies poll. This is the
# desktop counterpart to `release.yml`, which only releases the `mathdoku`
# *crate* to crates.io.
#
# The Designer app version (in apps/designer/src-tauri/tauri.conf.json) is
# independent of the `mathdoku-v*` crate version, so this workflow has its own
# trigger: push a `designer-v<version>` tag, or dispatch it manually. It does
# NOT fire on crate releases.
#
# Signing is two independent mechanisms:
#   1. Updater integrity: tauri-action signs each bundle and the update
#      manifest with the minisign private key in TAURI_SIGNING_PRIVATE_KEY.
#   2. macOS Gatekeeper: the APPLE_* secrets drive Developer ID code-signing
#      and notarization of the .app (handled by tauri-action) and of the .dmg
#      (the explicit staple step below; the bundler only codesigns the dmg).
#      With the APPLE_* secrets unset, macOS builds are produced unsigned.
#
# The minisign key was generated with `cargo tauri signer generate` and has no
# password (hence the empty TAURI_SIGNING_PRIVATE_KEY_PASSWORD). Its public half is embedded in
# tauri.conf.json under plugins.updater.pubkey; the private half is never
# committed. Lose the private key and existing installs can no longer verify
# updates.

on:
  push:
    tags:
      - "designer-v*"
  workflow_dispatch:

permissions: {}

# Don't let two tag pushes race into overlapping releases.
concurrency:
  group: release-designer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-designer:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write # create the GitHub release and upload bundles + latest.json
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macOS ships a single universal (arm64 + x86_64) bundle: Tauri's
          # `universal-apple-darwin` target lipo-fuses both slices into one
          # binary on a single runner, which tauri-action then signs and
          # notarizes as if it were single-arch. `rustTargets` lists the real
          # rustup targets to install — `universal-apple-darwin` is a Tauri
          # meta-target, not an installable rustup target, and the fused build
          # needs both arch slices present.
          - name: macOS (Universal)
            runner: macos-latest
            target: universal-apple-darwin
            rustTargets: aarch64-apple-darwin, x86_64-apple-darwin
          - name: Linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rustTargets: x86_64-unknown-linux-gnu
          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            rustTargets: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # The frontend is a wasm app; the desktop shell builds for the host.
          # macOS installs both arch slices for the universal build.
          targets: wasm32-unknown-unknown, ${{ matrix.platform.rustTargets }}

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Keyed per target so the matrix legs don't clobber each other.
          key: ${{ matrix.platform.target }}

      # Linux desktop builds need GTK/WebKitGTK and friends. macOS and Windows
      # have their webview preinstalled.
      - name: Install Linux system dependencies
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # Prebuilt trunk binary (matches the web-build and deploy-main jobs).
      # tauri-action invokes `trunk build` via beforeBuildCommand, so trunk and
      # the wasm target must already be present.
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Build, sign, and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The key was generated without a password.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Apple Developer ID signing + notarization. Only the macOS leg uses
          # these; they are inert on Linux/Windows. APPLE_CERTIFICATE is the
          # base64-encoded .p12 export of the Developer ID Application cert;
          # tauri-action imports it into a throwaway keychain on the runner.
          # The identity lives in a secret (not tauri.conf.json) so the repo
          # carries no personal identifiers and local unsigned dev builds work.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/designer/src-tauri
          # Reuse the pushed tag (designer-v<version>) as the release; for a
          # manual workflow_dispatch run, tauri-action falls back to the app
          # version from tauri.conf.json.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Mathdoku Designer v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.platform.target }}

      # Hand the freshly built Linux bundles to the smoke-test workflow so it
      # gates the release against the *real* bundles rather than rebuilding
      # them. These are the local build outputs (tauri-bundler's default names);
      # the smoke checks glob by extension, so the later asset renames don't
      # matter here. The .AppImage.tar.gz updater archive is excluded.
      - name: Upload Linux bundles for the smoke test
        if: matrix.platform.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-designer-bundles
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7

      # tauri-bundler notarizes and staples the .app, but the .dmg wrapper is
      # assembled afterwards and only codesigned, so it carries no notarization
      # ticket. Notarize and staple the dmg too, then swap the stapled copy
      # into the draft release. The auto-updater is unaffected: latest.json
      # references the .app.tar.gz updater archive, not the dmg.
      - name: Notarize and staple the DMG
        if: startsWith(matrix.platform.runner, 'macos')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        run: |
          set -euo pipefail
          # The universal build lands the dmg under the universal-apple-darwin
          # target dir; the glob resolves the single produced dmg.
          dmg=(target/${{ matrix.platform.target }}/release/bundle/dmg/*.dmg)
          dmg="${dmg[0]}"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          if [ -z "$RELEASE_ID" ]; then
            echo "No release to update (manual run without a tag); done."
            exit 0
          fi
          # tauri-action already uploaded the dmg under tauri-bundler's
          # version-stamped default name (GitHub stores asset names with spaces
          # replaced by dots). Delete that, plus any fixed-name asset left by a
          # re-run, then upload the stapled copy under the fixed, version-less
          # name the website's download link hardcodes.
          fixed="Designer-macos-universal.dmg"
          orig="$(basename "$dmg" | tr ' ' '.')"
          for name in "$orig" "$fixed"; do
            asset_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
              --jq ".[] | select(.name == \"$name\") | .id")"
            if [ -n "$asset_id" ]; then
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
            fi
          done
          gh api -X POST \
            -H "Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$fixed" \
            --input "$dmg" > /dev/null
          echo "Uploaded the stapled dmg as $fixed."

      # tauri-action uploads the Linux bundles under tauri-bundler's
      # version-stamped default names. Rename them in place to fixed,
      # version-less names so the website can hardcode the download links. The
      # auto-updater is unaffected: latest.json references the separate
      # .AppImage.tar.gz updater archive, not the bare .AppImage we rename here.
      - name: Pin Linux bundle names
        if: matrix.platform.runner == 'ubuntu-22.04' && steps.tauri.outputs.releaseId != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        run: |
          set -euo pipefail
          declare -A fixed=(
            [deb]="Designer-linux-x86_64.deb"
            [rpm]="Designer-linux-x86_64.rpm"
            [AppImage]="Designer-linux-x86_64.AppImage"
          )
          assets="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets")"
          for ext in deb rpm AppImage; do
            # endswith(".AppImage") excludes the ".AppImage.tar.gz" updater
            # archive and its .sig, leaving only the user-facing bundle.
            asset_id="$(echo "$assets" \
              | jq -r ".[] | select(.name | endswith(\".$ext\")) | .id" | head -n1)"
            if [ -n "$asset_id" ]; then
              gh api -X PATCH \
                "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
                -f name="${fixed[$ext]}" > /dev/null
              echo "Renamed .$ext bundle to ${fixed[$ext]}."
            fi
          done

  # Gate the release: install and launch the real Linux bundles on clean images
  # before the release is considered good. Reuses the same checks that run
  # continuously on pushes to main; skip-build makes it test the bundles the
  # release job just uploaded (in this same run) instead of rebuilding them.
  linux-smoke:
    name: Linux smoke test
    needs: release-designer
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/linux-smoke.yml
    with:
      skip-build: true
